# fly.toml — Raxus Backend (FastAPI)
# Déploiement: fly deploy depuis le dossier backend/

app = "raxus-api"
primary_region = "cdg"   # Paris — changer selon ta localisation
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "../docker/Dockerfile.backend"

[env]
  APP_ENV            = "production"
  APP_DEBUG          = "false"
  METRICS_SCRAPE_INTERVAL_SECONDS = "30"
  SLOW_QUERY_THRESHOLD_MS = "1000"
  LLM_MODEL          = "claude-sonnet-4-20250514"
  # Les secrets sensibles sont définis via: fly secrets set KEY=value
  # APP_SECRET_KEY, APP_DB_PASSWORD, REDIS_URL, CREDENTIALS_ENCRYPTION_KEY, ANTHROPIC_API_KEY

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size   = "shared-cpu-1x"
  memory = "1gb"

[checks]
  [checks.health]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 8000
    timeout      = "10s"
    type         = "http"
